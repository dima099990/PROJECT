<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Local AI</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <!-- Логин -->
  <div id="login" class="login">
    <div class="login-box">
      <h2 data-i18n="login_title">Вход</h2>
      <input id="password" type="password" data-i18n-ph="password"/>
      <button id="login-btn" data-i18n="login_btn">Войти</button>
      <div id="login-err" class="err"></div>
    </div>
  </div>

  <!-- Приложение -->
  <div id="app" class="app hidden">
    <header>
      <span class="brand">🤖 Local AI</span>
      <span id="status-pill" class="pill">…</span>
      <div class="spacer"></div>
      <button id="stop-btn" class="danger" data-i18n="stop">СТОП</button>
      <button id="lang-btn">EN</button>
      <button id="logout-btn" data-i18n="logout">Выход</button>
    </header>

    <nav id="tabs">
      <button class="tab active" data-tab="chat"     data-i18n="tab_chat">Чат</button>
      <button class="tab" data-tab="files"    data-i18n="tab_files">Файлы</button>
      <button class="tab" data-tab="agents"   data-i18n="tab_agents">Агенты</button>
      <button class="tab" data-tab="models"   data-i18n="tab_models">Модели</button>
      <button class="tab" data-tab="training" data-i18n="tab_training">Обучение</button>
      <button class="tab" data-tab="logs"     data-i18n="tab_logs">Логи</button>
      <button class="tab" data-tab="status"   data-i18n="tab_status">Статус</button>
    </nav>

    <main>
      <section id="panel-chat" class="panel active">
        <div id="chat-log" class="chat-log"></div>
        <div class="chat-input">
          <input id="chat-msg" data-i18n-ph="chat_ph"/>
          <button id="chat-send" data-i18n="send">Отпр.</button>
        </div>
      </section>

      <section id="panel-files" class="panel"><div id="files-view" class="muted">—</div></section>
      <section id="panel-agents" class="panel"><div id="agents-view" class="muted">—</div></section>
      <section id="panel-models" class="panel"><div id="models-view" class="muted">—</div></section>
      <section id="panel-training" class="panel"><div id="training-view" class="muted">—</div></section>
      <section id="panel-logs" class="panel"><pre id="logs-view" class="muted">—</pre></section>
      <section id="panel-status" class="panel"><pre id="status-view" class="muted">—</pre></section>
    </main>
  </div>

  <script src="/static/i18n.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
